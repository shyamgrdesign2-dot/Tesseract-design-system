name: Publish to npm (public)

# Publishes @dhspl-tatvacare/tesseract-ui to the PUBLIC npm registry (npmjs.org) so
# consumers install with ZERO auth:
#   npm install @dhspl-tatvacare/tesseract-ui
# No .npmrc, no token, no org membership needed on the consumer side.
#
# ONE-TIME setup (maintainer):
#   1. Create an npm org named "dhspl-tatvacare" (npmjs.com → orgs) that owns the scope.
#   2. Create an npm "Automation" access token (npmjs.com → Access Tokens).
#   3. Add it to this repo's GitHub secrets as NPM_TOKEN.
# The source repo can stay private — only the built dist is published.
#
# Triggers: on a published GitHub Release (normal path), or manual workflow_dispatch.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-package
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@dhspl-tatvacare"

      - run: npm ci

      - name: Install MCP deps (needed by preflight)
        run: npm --prefix mcp ci || npm --prefix mcp install

      - name: Preflight — never publish a broken build
        run: npm run preflight

      - name: Build library (ESM + CJS + CSS + types)
        run: npm run build:lib

      - name: Publish to public npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
