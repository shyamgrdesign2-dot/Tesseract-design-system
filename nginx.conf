# Serves the prebuilt Storybook (/usr/share/nginx/html) on :8080 as a non-root
# user. Mounted at /etc/nginx/conf.d/default.conf by the Dockerfile.
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- compression ----
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json
                      application/xml image/svg+xml font/woff2;

    # ---- long-cache the fingerprinted build assets ----
    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|ico|svg|json|map)$ {
        expires      7d;
        add_header   Cache-Control "public";
        try_files    $uri =404;
    }

    # ---- Tesseract MCP (co-hosted): reverse-proxy /mcp to the local Node MCP
    #      process (Streamable HTTP). Buffering off so SSE streams immediately. ----
    location /mcp {
        proxy_pass              http://127.0.0.1:8787;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Forwarded-For $remote_addr;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection "";
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        chunked_transfer_encoding on;
    }

    # ---- Tesseract MCP OAuth 2.1 (co-hosted): proxy the discovery metadata,
    #      dynamic client registration, authorize, and token endpoints to the Node MCP,
    #      so Claude's Connectors UI can authenticate. (openid-configuration stays 404 —
    #      we implement OAuth, not OIDC.) The SPA fallback below must NOT catch these. ----
    location = /.well-known/oauth-authorization-server { proxy_pass http://127.0.0.1:8787; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /.well-known/oauth-protected-resource   { proxy_pass http://127.0.0.1:8787; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /.well-known/openid-configuration        { return 404; }
    location ~ ^/(authorize|token|register)$ {
        proxy_pass              http://127.0.0.1:8787;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }

    # ---- Storybook entry: serve the requested file (e.g. iframe.html) if it
    #      exists, otherwise fall back to the manager (index.html). ----
    location / {
        add_header  X-Content-Type-Options "nosniff" always;
        try_files   $uri $uri/ /index.html;
    }
}
