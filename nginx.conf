# Serves the prebuilt Storybook (/usr/share/nginx/html) on :8080 as a non-root
# user. Mounted at /etc/nginx/conf.d/default.conf by the Dockerfile.
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- compression ----
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json
                      application/xml image/svg+xml font/woff2;

    # ---- long-cache the fingerprinted build assets ----
    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|ico|svg|json|map)$ {
        expires      7d;
        add_header   Cache-Control "public";
        try_files    $uri =404;
    }

    # ---- Storybook entry: serve the requested file (e.g. iframe.html) if it
    #      exists, otherwise fall back to the manager (index.html). ----
    location / {
        add_header  X-Content-Type-Options "nosniff" always;
        try_files   $uri $uri/ /index.html;
    }
}
