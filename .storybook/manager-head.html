<!-- ───────────────────────────────────────────────────────────────────────
     Tesseract Storybook access gate.

     ⚠️  CLIENT-SIDE DETERRENT, NOT REAL SECURITY. The password hashes ship in
     this page, so a determined visitor can bypass it. It keeps casual eyes out
     of the deployed Storybook. For genuine protection, enable Vercel
     Deployment Protection (Settings → Deployment Protection → Password) — see
     docs/DEPLOY-AUTH.md.

     To change who can get in: replace the SHA-256 hashes in HASHES below
     (generate with:  node -e 'console.log(require("crypto").createHash("sha256").update("YOUR_PASSWORD").digest("hex"))' ).
─────────────────────────────────────────────────────────────────────────── -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  #tp-gate {
    position: fixed; inset: 0; z-index: 2147483647;
    display: flex; align-items: center; justify-content: center;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #6D5BD0 0%, transparent 60%),
      linear-gradient(160deg, #2B2A6E 0%, #1B1B45 100%);
  }
  #tp-gate * { box-sizing: border-box; }
  .tp-gate-card {
    width: min(380px, calc(100vw - 32px));
    background: #fff; border-radius: 20px; padding: 32px 28px 28px;
    box-shadow: 0 24px 60px -16px rgba(16,16,75,.55);
    text-align: center; animation: tp-pop 220ms ease;
  }
  @keyframes tp-pop { from { opacity:0; transform: translateY(8px) scale(.98); } to { opacity:1; transform:none; } }
  @keyframes tp-shake { 10%,90%{transform:translateX(-2px)} 30%,70%{transform:translateX(4px)} 50%{transform:translateX(-6px)} }
  .tp-gate-mark {
    width: 52px; height: 52px; margin: 0 auto 16px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(150deg, #4B4AD5, #6D5BD0);
    box-shadow: 0 10px 22px -8px rgba(75,74,213,.6); color: #fff; font-weight: 700; font-size: 22px;
  }
  .tp-gate-title { margin: 0 0 4px; font-size: 19px; font-weight: 700; color: #15153A; }
  .tp-gate-sub { margin: 0 0 22px; font-size: 13px; color: #5A5A7A; line-height: 1.5; }
  .tp-gate-field {
    width: 100%; height: 46px; padding: 0 14px; font-size: 15px; font-family: inherit;
    color: #15153A; background: #F6F6FB; border: 1.5px solid transparent; border-radius: 12px; outline: none;
    transition: border-color 140ms, background 140ms;
  }
  .tp-gate-field:focus { border-color: #4B4AD5; background: #fff; }
  .tp-gate-field::placeholder { color: #9A9AB5; }
  .tp-gate-err { min-height: 18px; margin: 8px 2px 0; font-size: 12.5px; color: #E5484D; text-align: left; opacity: 0; transition: opacity 120ms; }
  .tp-gate-err[data-show] { opacity: 1; }
  .tp-gate-btn {
    width: 100%; height: 46px; margin-top: 12px; border: none; border-radius: 12px; cursor: pointer;
    font-family: inherit; font-size: 15px; font-weight: 600; color: #fff;
    background: linear-gradient(150deg, #4B4AD5, #6D5BD0);
    box-shadow: 0 10px 22px -10px rgba(75,74,213,.7); transition: filter 140ms, transform 80ms;
  }
  .tp-gate-btn:hover { filter: brightness(1.06); }
  .tp-gate-btn:active { transform: translateY(1px); }
  .tp-gate-foot { margin: 18px 0 0; font-size: 11px; color: #9A9AB5; }
</style>
<script>
  (function () {
    var KEY = "tp_sb_auth";
    // SHA-256 hashes of the valid access passwords (plaintext shared out-of-band).
    var HASHES = [
      "28ae90e878ca1348d554e21725ef1aab946a5096dd28c4a2e71354320486494f",
      "523f6234c95f1052e5e6dfbb3692a23c14a4a5c6904ddc21a18d05dac5bdd0e8",
      "a01556a30c0bbe1adab205d22d80f5d9ff8d85b064064c1abaa0367171029b53"
    ];
    try { if (sessionStorage.getItem(KEY) === "1") return; } catch (e) { /* storage blocked → still gate */ }

    function sha256Hex(str) {
      var buf = new TextEncoder().encode(str);
      return crypto.subtle.digest("SHA-256", buf).then(function (d) {
        return Array.prototype.map.call(new Uint8Array(d), function (b) {
          return b.toString(16).padStart(2, "0");
        }).join("");
      });
    }

    function mount() {
      if (document.getElementById("tp-gate")) return;
      var ov = document.createElement("div");
      ov.id = "tp-gate";
      ov.innerHTML =
        '<form class="tp-gate-card" autocomplete="off">' +
          '<div class="tp-gate-mark">T</div>' +
          '<h1 class="tp-gate-title">Tesseract Design System</h1>' +
          '<p class="tp-gate-sub">This Storybook is private. Enter your access password to continue.</p>' +
          '<input class="tp-gate-field" id="tp-gate-input" type="password" placeholder="Access password" autofocus aria-label="Access password" />' +
          '<div class="tp-gate-err" id="tp-gate-err" role="alert"></div>' +
          '<button class="tp-gate-btn" type="submit">Enter</button>' +
          '<p class="tp-gate-foot">Tatvacare · authorised access only</p>' +
        '</form>';
      document.body.appendChild(ov);

      var form = ov.querySelector("form");
      var input = ov.querySelector("#tp-gate-input");
      var err = ov.querySelector("#tp-gate-err");
      var card = ov.querySelector(".tp-gate-card");
      input.focus();

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var val = input.value || "";
        sha256Hex(val).then(function (hex) {
          if (HASHES.indexOf(hex) !== -1) {
            try { sessionStorage.setItem(KEY, "1"); } catch (e2) {}
            ov.remove();
          } else {
            err.textContent = "Incorrect password. Try again.";
            err.setAttribute("data-show", "");
            card.style.animation = "tp-shake 320ms";
            input.select();
            setTimeout(function () { card.style.animation = ""; }, 340);
          }
        });
      });
    }

    if (document.body) mount();
    else document.addEventListener("DOMContentLoaded", mount);
  })();
</script>
